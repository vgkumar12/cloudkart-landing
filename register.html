<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Store - CloudKart</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .register-container {
            max-width: 600px;
            margin: 4rem auto;
            padding: 2rem;
            background: white;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--gray-100);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--gray-700);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg);
            transition: var(--transition-base);
        }

        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(107, 70, 193, 0.1);
        }

        .domain-status {
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        .domain-status.available {
            color: var(--success);
            display: block;
        }

        .domain-status.taken {
            color: var(--danger);
            display: block;
        }

        .plan-summary {
            background: var(--gray-50);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
            border: 1px dashed var(--gray-300);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.png" alt="CloudKart Logo">
                CloudKart
            </a>
        </div>
    </nav>

    <footer style="background: var(--gray-900); color: white; padding: 2rem 0; margin-top: 4rem;">
        <div class="container"
            style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <p style="color: var(--gray-400); margin: 0;">&copy; <span id="currentYearFooter"></span> CloudKart. All
                rights reserved.</p>
            <div style="display: flex; gap: 1.5rem;">
                <a href="privacy-policy.html"
                    style="color: var(--gray-400); text-decoration: none; font-size: 0.9rem;">Privacy Policy</a>
                <a href="terms-and-conditions.html"
                    style="color: var(--gray-400); text-decoration: none; font-size: 0.9rem;">Terms & Conditions</a>
            </div>
        </div>
    </footer>
    <script>document.getElementById('currentYearFooter').textContent = new Date().getFullYear();</script>

    <div class="container">
        <div class="register-container">
            <h2 style="text-align: center; margin-bottom: 0.5rem;">Launch Your Store</h2>
            <p style="text-align: center; color: var(--gray-500); margin-bottom: 2rem;">Fill in your details to get
                started.</p>

            <div id="planSummary" class="plan-summary" style="display: none;">
                <h4 id="selectedPlanName">Plan: Loading...</h4>
                <p id="selectedPlanPrice" style="font-weight: 700; color: var(--primary);"></p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="storeName">Store Name</label>
                    <input type="text" id="storeName" class="form-control" placeholder="e.g. My Awesome Shop" required>
                </div>

                <div class="form-group">
                    <label for="subdomain">Subdomain</label>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <input type="text" id="subdomain" class="form-control" placeholder="my-shop" required>
                        <span style="font-weight: 600; color: var(--gray-500);">.cloudkart.com</span>
                    </div>
                    <div id="domainStatus" class="domain-status"></div>
                </div>

                <div class="form-group">
                    <label for="customDomain">Custom Domain (Optional)</label>
                    <input type="text" id="customDomain" class="form-control" placeholder="www.yourdomain.com">
                </div>

                <hr style="margin: 2rem 0; border: 0; border-top: 1px solid var(--gray-100);">

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="width: 100%; margin-top: 1rem;">
                    Continue to Payment
                </button>
            </form>
        </div>
    </div>

    <script>
        // Get plan from URL
        const urlParams = new URLSearchParams(window.location.search);
        const planId = urlParams.get('plan') || 1;

        // Fetch plan details (simulated or real)
        const planNames = { 1: 'Basic', 2: 'Standard', 3: 'App Plan' };
        const planPrices = { 1: '₹14,999', 2: '₹19,999', 3: '₹24,999' };

        document.getElementById('planSummary').style.display = 'block';
        document.getElementById('selectedPlanName').textContent = 'Plan: ' + planNames[planId];
        document.getElementById('selectedPlanPrice').textContent = planPrices[planId] + ' (One-time setup)';

        // Subdomain Check
        const subdomainInput = document.getElementById('subdomain');
        const domainStatus = document.getElementById('domainStatus');
        let checkTimeout;

        subdomainInput.addEventListener('input', () => {
            clearTimeout(checkTimeout);
            const value = subdomainInput.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
            subdomainInput.value = value;

            if (value.length < 3) {
                domainStatus.style.display = 'none';
                return;
            }

            checkTimeout = setTimeout(async () => {
                try {
                    const response = await fetch('api/api/domain/check', {
                        method: 'POST',
                        body: JSON.stringify({ subdomain: value }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    const res = await response.json();
                    if (res.data.available) {
                        domainStatus.textContent = 'Awesome! This subdomain is available.';
                        domainStatus.className = 'domain-status available';
                    } else {
                        domainStatus.textContent = 'Sorry, this subdomain is already taken.';
                        domainStatus.className = 'domain-status taken';
                    }
                } catch (e) {
                    console.error(e);
                }
            }, 500);
        });

        // Registration Submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                store_name: document.getElementById('storeName').value,
                subdomain: document.getElementById('subdomain').value,
                custom_domain: document.getElementById('customDomain').value,
                plan_id: planId
            };

            try {
                // 1. Register User
                const regResponse = await fetch('api/api/register', {
                    method: 'POST',
                    body: JSON.stringify(formData),
                    headers: { 'Content-Type': 'application/json' }
                });
                const regRes = await regResponse.json();

                if (!regRes.success) {
                    alert(regRes.message);
                    return;
                }

                // 2. Initiate Provisioning (Free Flow)
                formData.user_id = regRes.data.user_id;

                // Show loading state for provisioning
                const submitBtn = document.querySelector('button[type="submit"]');
                const originalBtnText = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Setting up your store...';

                const checkoutResponse = await fetch('api/api/checkout', {
                    method: 'POST',
                    body: JSON.stringify(formData),
                    headers: { 'Content-Type': 'application/json' }
                });
                const checkRes = await checkoutResponse.json();

                if (checkRes.success) {
                    // Success! Show success message or redirect
                    alert("Store provisioned successfully!");
                    window.location.href = 'checkout_success.html?store_id=' + checkRes.data.store_id +
                        '&store_url=' + encodeURIComponent(checkRes.data.store_url) +
                        '&admin_url=' + encodeURIComponent(checkRes.data.admin_url);
                } else {
                    alert("Provisioning failed: " + checkRes.message);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalBtnText;
                }
            } catch (e) {
                alert("An error occurred during registration.");
            }
        });
    </script>
</body>

</html>
